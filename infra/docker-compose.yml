services:
  
  app:
    image: camaguru_app_img
    build:
      context: ..
      dockerfile: infra/app/Dockerfile

    container_name: camaguru_app

    user: "${UID}:${GID}"

    working_dir: /app

    volumes:
      - ../app:/app

    ports:
      - "8080:8080"
      - "5005:5005" #debug remoto

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}

    depends_on:
      - db

    tty: true

    stdin_open: true
  db:
    image: postgres:16

    command:
      - "postgres"
      - "-c"
      - "log_statement=all"

    container_name: camaguru_db

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql